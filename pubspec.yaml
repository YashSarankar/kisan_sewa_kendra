name: kisan_sewa_kendra
description: "Krishi Bhandar shopify website's App"

publish_to: 'none'

version: 2.0.6+10

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.12.0

  carousel_slider_plus: ^7.1.1
  http: ^1.6.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  package_info_plus: ^8.1.2

  cached_network_image: ^3.4.1
  cached_network_image_plus: ^0.0.5
  shimmer: ^3.0.0
  flutter_widget_from_html: ^0.17.1
  badges: ^3.1.2
  webview_flutter: ^4.13.1

  firebase_core: ^4.0.0
  firebase_analytics: ^12.1.3
  firebase_remote_config: ^6.1.3
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^17.0.0
  facebook_app_events: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon_foreground.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter_native_splash:
  color: "#26842c"
  image: assets/logo_splash.png

  android_12:
    color: "#26842c"
    image: assets/logo_splash.png
  fullscreen: true
